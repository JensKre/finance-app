# Database Configuration (Persistent file database in production directory)
spring.datasource.url=jdbc:h2:./financedb_prod;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# H2 Console (Disabled in production for security, change to true if needed)
spring.h2.console.enabled=false
